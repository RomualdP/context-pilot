tools:
  Behaviour_create:
    description: |
      Creates a new behaviour (agent, skill, or command) as a .md file with YAML frontmatter. ID is auto-generated from the name (slugified). Fails if a behaviour with that ID already exists.

      To edit an existing behaviour, use the Edit tool directly on its .md file (shown in the Library panel).
      To delete a behaviour, delete its .md file. The system detects removals automatically.
    parameters:
      name: "Behaviour name (e.g., 'Code Reviewer')"
      type: "Type: 'agent', 'skill', or 'command'"
      description: "Short description"
      content: "Body content — varies by type: for agents, a system prompt (personality, guidelines, constraints); for skills, reference material or instructions loaded as a context panel; for commands, text that replaces a /command typed by the user"

  agent_load:
    description: |
      Activates an agent as the current system prompt. Pass empty id to revert to default.
    parameters:
      id: "Agent ID to activate. Empty to use default."

  skill_load:
    description: |
      Loads a skill as a context panel. The skill's content becomes visible to the AI as a context block. To unload a skill, close its panel with Close_panel.
    parameters:
      id: "Skill ID to load"
