tools:
  log_create:
    description: |
      Creates timestamped log entries for recording decisions, actions, or notable events during the conversation. Each entry can have an importance level. Logs are indexed by the search module for full-text retrieval.
    parameters:
      entries: "Array of log entries to create (timestamped automatically)"
      content: "Short, atomic log entry"
      importance: "Importance level"

  Close_conversation_history:
    description: |
      Closes one or more conversation history panels. Before closing, creates log entries to preserve important information. Everything in the history panels will be lost after closing.

      IMPORTANT: Before calling this tool, carefully review ALL human messages in each panel. Extract and preserve:
      - **Logs**: Short, atomic entries for mid-conversation context — decisions made, actions taken, bugs found, user preferences expressed, task context. Logs are medium-lifecycle: they maintain conversation flow across reloads.

      Every substantive piece of information from human messages should be captured in a log. When in doubt, preserve it. Log timestamps are set to each panel's last message time, not the current time.
    parameters:
      panels: "Array of panels to close"
      panel_id: "ID of the conversation history panel to close (e.g., 'P12')"
      logs: "Log entries to create — simple strings, one per entry"
