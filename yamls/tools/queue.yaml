tools:
  Queue_pause:
    description: |
      Pauses the queue — tool calls execute normally again. The existing queue stays intact for later flush or empty.

  Queue_execute:
    description: |
      Executes all queued tool calls in order, atomically. Returns a summary of results. Clears the queue after execution. This is the 'commit' — one cache break instead of N.

  Queue_undo:
    description: |
      Removes specific queued action(s) by their index number. Check the Queue panel to see indices.
      If all remaining actions are removed, the queue automatically deactivates.
    parameters:
      indices: "Indices of queued actions to remove (e.g., [1, 3])"
